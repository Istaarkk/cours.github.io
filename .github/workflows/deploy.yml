name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble site
        run: |
          mkdir -p _site/math
          cp index.html _site/
          cp math/probabilites-terminale-cahier.html _site/math/
          cp math/suites.html _site/math/
          cp math/limites-continuite.html _site/math/
          cp math/derivation-convexite.html _site/math/
          cp math/logarithme.html _site/math/
          cp math/exponentielle.html _site/math/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
