name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: setup_pages
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Skip deploy when Pages is not enabled
        if: steps.setup_pages.outcome != 'success'
        run: echo "::warning::GitHub Pages is not enabled for this repository. Skipping deployment."

      - name: Assemble site
        if: steps.setup_pages.outcome == 'success'
        run: |
          mkdir -p _site/math
          cp index.html _site/
          cp quantum-masterclass.html _site/
          cp math/*.html _site/math/

      - name: Upload site artifact
        if: steps.setup_pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: steps.setup_pages.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v4
